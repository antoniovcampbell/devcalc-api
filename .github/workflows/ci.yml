name: CI DevCalc

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  quality-check:
    uses: ./.github/workflows/lint-and-test.yml
    with:
      run_tests: true
      run_lint: true

  build:
    runs-on: ubuntu-latest
    needs: quality-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - run: mvn clean package

  open-issue:
    runs-on: ubuntu-latest
    needs: [quality-check, build]
    if: ${{ always() && (needs.quality-check.result == 'failure' || needs.build.result == 'failure' || vars.SUPPORT_EMAIL == '') }}
    steps:
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            ${{ github.api_url }}/repos/${{ github.repository }}/issues \
            -d '{"title":"Falha no pipeline DevCalc","body":"Issue criada automaticamente porque o pipeline falhou ou a variável SUPPORT_EMAIL não foi definida."}'