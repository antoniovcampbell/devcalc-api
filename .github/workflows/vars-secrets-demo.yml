name: Vars And Secrets Demo

on:
  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest
    env:
      APP_MODE: ${{ vars.APP_MODE }}
      SUPPORT_EMAIL: ${{ vars.SUPPORT_EMAIL }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "APP_MODE=$APP_MODE"
          echo "SUPPORT_EMAIL=$SUPPORT_EMAIL"
      - if: ${{ secrets.PROD_TOKEN != '' }}
        env:
          PROD_TOKEN: ${{ secrets.PROD_TOKEN }}
        run: echo "Token carregado com ${#PROD_TOKEN} caracteres"